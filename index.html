<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Araya Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--navy:#1B3A5C;--navy2:#142d4a;--gold:#C9A84C;--gold2:#b8972f;--champ:#F5E6C8;--taupe:#8B7355;--white:#FFFFFF;--offwhite:#FAF7F2;--border:#E0D5C0;--red:#c0392b;--green:#1a7a4a;--text:#1a1a1a;--mid:#555;--light:#f0ebe0;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'DM Sans',sans-serif;background:var(--offwhite);color:var(--text);}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--offwhite);}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;}
/* LOGIN overlay — fixed, hides once logged in */
#loginOverlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy) 0%,#0d2238 60%,#1a3550 100%);overflow:hidden;transition:opacity 0.4s,pointer-events 0.4s;}
#loginOverlay.hidden{opacity:0;pointer-events:none;}
#loginOverlay::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(201,168,76,0.04) 60px,rgba(201,168,76,0.04) 61px),repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(201,168,76,0.04) 60px,rgba(201,168,76,0.04) 61px);}
.login-orb{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.12) 0%,transparent 70%);top:-100px;right:-100px;}
.login-orb2{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.08) 0%,transparent 70%);bottom:-80px;left:-60px;}
.login-card{position:relative;z-index:2;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.3);backdrop-filter:blur(20px);padding:52px 48px;width:420px;box-shadow:0 40px 80px rgba(0,0,0,0.4);}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--gold);letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:4px;}
.login-sub{text-align:center;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:rgba(245,230,200,0.5);margin-bottom:40px;}
.login-divider{width:40px;height:2px;background:var(--gold);margin:0 auto 36px;}
.login-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(245,230,200,0.6);margin-bottom:8px;display:block;}
.login-input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(201,168,76,0.25);color:var(--champ);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border 0.2s;margin-bottom:24px;letter-spacing:3px;}
.login-input:focus{border-color:var(--gold);}
.login-input::placeholder{letter-spacing:1px;color:rgba(245,230,200,0.3);}
.login-btn{width:100%;padding:15px;background:var(--gold);border:none;color:var(--navy);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-top:4px;}
.login-btn:hover{background:var(--gold2);transform:translateY(-1px);}
.login-error{color:#ff6b6b;font-size:12px;text-align:center;margin-top:12px;display:none;}
.login-verse{text-align:center;font-size:10px;color:rgba(245,230,200,0.3);margin-top:32px;font-style:italic;font-family:'Cormorant Garamond',serif;}
.session-timer{position:fixed;bottom:14px;right:14px;background:rgba(27,58,92,0.92);color:rgba(245,230,200,0.7);font-size:11px;padding:5px 11px;z-index:200;display:none;border-left:2px solid var(--gold);}
/* APP */
#appShell{display:flex;flex-direction:column;min-height:100vh;}
.topnav{background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.2);}
.topnav-brand{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;color:var(--gold);letter-spacing:2px;cursor:pointer;white-space:nowrap;}
.topnav-brand span{color:rgba(245,230,200,0.45);font-size:13px;font-weight:400;margin-left:8px;}
.topnav-links{display:flex;gap:2px;align-items:center;flex-wrap:wrap;}
.nav-btn{padding:7px 12px;background:transparent;border:none;color:rgba(245,230,200,0.65);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all 0.15s;border-radius:2px;}
.nav-btn:hover,.nav-btn.active{background:rgba(201,168,76,0.15);color:var(--gold);}
.nav-logout{padding:6px 13px;background:transparent;border:1px solid rgba(201,168,76,0.3);color:rgba(245,230,200,0.5);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all 0.2s;margin-left:6px;}
.nav-logout:hover{border-color:var(--gold);color:var(--gold);}
.app-content{flex:1;padding:26px;}
/* CARDS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--white);padding:18px 20px;border-left:3px solid var(--gold);box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.stat-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--taupe);margin-bottom:7px;}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:700;color:var(--navy);}
.stat-note{font-size:11px;color:var(--taupe);margin-top:3px;}
/* DASH */
.dash-hero{background:linear-gradient(135deg,var(--navy) 0%,#1a3550 100%);padding:32px 38px 26px;margin-bottom:24px;position:relative;overflow:hidden;}
.dash-hero::after{content:'';position:absolute;right:-60px;top:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.15) 0%,transparent 70%);}
.dash-greeting{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--white);margin-bottom:4px;}
.dash-greeting span{color:var(--gold);}
.dash-sub{color:rgba(245,230,200,0.55);font-size:13px;}
.dash-date{color:var(--gold);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:7px;}
.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.menu-card{background:var(--white);padding:26px 22px;cursor:pointer;border:1px solid var(--border);transition:all 0.2s;position:relative;overflow:hidden;}
.menu-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold);transform:scaleX(0);transition:transform 0.2s;}
.menu-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.1);}
.menu-card:hover::before{transform:scaleX(1);}
.menu-icon{font-size:24px;margin-bottom:12px;}
.menu-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--navy);margin-bottom:5px;}
.menu-desc{font-size:11px;color:var(--taupe);line-height:1.6;}
.menu-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:18px;opacity:0;transition:opacity 0.2s;}
.menu-card:hover .menu-arrow{opacity:1;}
/* SECTION */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:13px;border-bottom:2px solid var(--navy);}
.section-title{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:700;color:var(--navy);}
.section-title span{color:var(--gold);}
/* BUTTONS */
.btn{padding:8px 18px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;}
.btn-navy{background:var(--navy);color:white;}.btn-navy:hover{background:var(--navy2);}
.btn-gold{background:var(--gold);color:var(--navy);}.btn-gold:hover{background:var(--gold2);}
.btn-outline{background:transparent;border:1px solid var(--navy);color:var(--navy);}.btn-outline:hover{background:var(--navy);color:white;}
.btn-sm{padding:5px 12px;font-size:10px;}
.btn-red{background:#c0392b;color:white;}.btn-green{background:var(--green);color:white;}
/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--taupe);}
.form-input,.form-select,.form-textarea{padding:10px 12px;border:1px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border 0.2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--navy);}
.form-textarea{resize:vertical;min-height:70px;}
.form-section{background:var(--white);padding:22px;margin-bottom:16px;border:1px solid var(--border);}
.form-section-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--navy);background:var(--champ);padding:7px 12px;margin:-22px -22px 18px;border-bottom:2px solid var(--gold);}
/* LINE TABLE */
.line-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px;}
.line-table th{background:var(--navy);color:white;padding:8px 10px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;text-align:left;}
.line-table th:nth-child(n+2){text-align:right;}
.line-table td{padding:7px 10px;border-bottom:1px solid var(--border);}
.line-table td:nth-child(n+2){text-align:right;}
.line-table tbody tr:nth-child(even){background:#faf7f0;}
.line-table tbody tr:hover{background:var(--champ);}
.line-table input{border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;text-align:right;width:100%;outline:none;color:var(--text);padding:2px 3px;}
.line-table input:focus{background:var(--champ);}
.line-table .date-input{text-align:left;}
.del-row{background:transparent;border:none;color:#c0392b;cursor:pointer;font-size:14px;padding:0 3px;}
/* TOTALS */
.inv-totals-box{display:flex;justify-content:flex-end;margin-top:10px;}
.totals-inner{width:290px;}
.total-row{display:flex;justify-content:space-between;padding:7px 12px;font-size:13px;}
.total-row.grand{background:var(--navy);color:white;font-weight:700;font-size:14px;margin-top:3px;}
.total-row.sub{background:var(--champ);}
.total-row.net{background:var(--light);font-weight:600;color:var(--navy);}
/* HISTORY */
.history-filters{display:flex;gap:9px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-select{padding:7px 12px;border:1px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:12px;outline:none;}
.history-table{width:100%;border-collapse:collapse;background:white;font-size:12px;}
.history-table th{background:var(--navy);color:white;padding:9px 13px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;text-align:left;}
.history-table td{padding:10px 13px;border-bottom:1px solid var(--border);}
.history-table tbody tr:hover{background:var(--champ);}
.status-badge{display:inline-block;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.badge-paid{background:#d4edda;color:#155724;}
.badge-pending{background:#fff3cd;color:#856404;}
.badge-overdue{background:#f8d7da;color:#721c24;}
.action-btns{display:flex;gap:4px;flex-wrap:wrap;}
/* INCOME */
.income-month-select{background:rgba(255,255,255,0.1);border:1px solid rgba(201,168,76,0.3);color:var(--champ);padding:7px 13px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;margin-top:12px;}
.breakdown-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px;}
.breakdown-card{background:white;padding:20px;border-left:4px solid var(--gold);box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.bc-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--taupe);margin-bottom:5px;}
.bc-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--navy);}
.bc-pct{font-size:11px;color:var(--taupe);margin-top:2px;}
.bc-note{font-size:11px;color:var(--green);margin-top:5px;font-weight:500;}
.breakdown-card.red{border-left-color:#c0392b;}
.breakdown-card.blue{border-left-color:#2980b9;}
.breakdown-card.purple{border-left-color:#8e44ad;}
.rec-box{background:white;padding:24px;border:1px solid var(--border);margin-bottom:16px;}
.rec-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--navy);margin-bottom:13px;}
.rec-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.rec-item:last-child{border-bottom:none;}
.rec-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);margin-top:5px;flex-shrink:0;}
.rec-text{font-size:13px;color:var(--mid);line-height:1.6;}
.rec-text strong{color:var(--navy);}
/* BUDGET TABS */
.budget-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid var(--navy);overflow-x:auto;}
.btab{padding:8px 18px;background:transparent;border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;color:var(--taupe);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s;white-space:nowrap;}
.btab.active{color:var(--navy);border-bottom-color:var(--navy);}
.btab-panel{display:none;}
.btab-panel.active{display:block;}
/* DEBT */
.debt-card{background:white;padding:18px;margin-bottom:12px;border:1px solid var(--border);display:flex;align-items:center;gap:16px;}
.debt-info{flex:1;}
.debt-name{font-weight:600;color:var(--navy);font-size:14px;margin-bottom:3px;}
.debt-meta{font-size:12px;color:var(--taupe);}
.debt-bar-wrap{flex:1;height:7px;background:var(--light);border-radius:4px;overflow:hidden;}
.debt-bar{height:100%;background:var(--gold);border-radius:4px;transition:width 0.5s;}
.debt-amount{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--red);text-align:right;min-width:80px;}
.payoff-plan{background:white;padding:24px;border:1px solid var(--border);}
.payoff-row{display:grid;grid-template-columns:auto 1fr 100px 110px 80px;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
.payoff-row:last-child{border-bottom:none;}
.payoff-priority{width:22px;height:22px;border-radius:50%;background:var(--navy);color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
/* BIZ TRACKER */
.biz-selector{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap;}
.biz-pill{padding:7px 16px;border:2px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;border-radius:20px;color:var(--taupe);}
.biz-pill.active{border-color:var(--navy);background:var(--navy);color:var(--gold);}
.tracker-row{display:grid;grid-template-columns:32px 1fr 150px 110px 80px 30px;gap:10px;align-items:center;padding:11px 14px;background:white;border-bottom:1px solid var(--border);transition:background 0.15s;}
.tracker-row:hover{background:#faf7f0;}
.tracker-row.paid-row{background:#f0faf4;}
.tracker-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all 0.2s;user-select:none;}
.tracker-check.checked{background:var(--green);border-color:var(--green);color:white;}
/* SPENDING */
.receipt-drop{border:2px dashed var(--border);padding:28px;text-align:center;cursor:pointer;transition:all 0.2s;background:white;margin-bottom:16px;}
.receipt-drop:hover,.receipt-drop.dragover{border-color:var(--gold);background:var(--champ);}
.spending-head{display:grid;grid-template-columns:120px 1fr 110px 110px 32px;gap:8px;padding:8px 13px;background:var(--navy);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:white;}
.spending-row-el{display:grid;grid-template-columns:120px 1fr 110px 110px 32px;gap:8px;padding:8px 13px;background:white;border-bottom:1px solid var(--border);font-size:12px;align-items:center;}
.spending-row-el:nth-child(even){background:#faf7f0;}
.spending-row-el:hover{background:var(--champ);}
.cat-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--champ);color:var(--taupe);text-transform:uppercase;}
.spending-total-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;margin-bottom:5px;}
/* COMPANY */
.company-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.company-card{background:white;padding:22px;border:1px solid var(--border);transition:all 0.2s;}
.company-card:hover{box-shadow:0 8px 24px rgba(0,0,0,0.1);transform:translateY(-2px);}
.company-card.add-new{border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--taupe);gap:8px;min-height:150px;cursor:pointer;}
.company-card.add-new:hover{border-color:var(--gold);color:var(--gold);}
.company-initials{width:42px;height:42px;background:var(--navy);color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:9px;}
.company-name{font-weight:600;color:var(--navy);font-size:14px;margin-bottom:2px;}
.company-type{font-size:10px;color:var(--taupe);text-transform:uppercase;letter-spacing:1px;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);width:90%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 40px 80px rgba(0,0,0,0.3);}
.modal-header{background:var(--navy);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:2;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--gold);}
.modal-close{background:transparent;border:none;color:rgba(245,230,200,0.5);font-size:19px;cursor:pointer;}
.modal-close:hover{color:var(--gold);}
.modal-body{padding:24px;}
/* TOAST */
.toast{position:fixed;bottom:26px;right:26px;background:var(--navy);color:var(--champ);padding:12px 20px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.3);transform:translateY(80px);opacity:0;transition:all 0.3s;z-index:9999;border-left:3px solid var(--gold);}
.toast.show{transform:translateY(0);opacity:1;}
/* EDITABLE */
.ef{border:none;background:transparent;font-family:inherit;font-size:inherit;color:inherit;font-weight:inherit;border-bottom:1px dashed transparent;transition:border 0.15s;padding:1px 3px;outline:none;}
.ef:hover{border-bottom-color:var(--gold);}
.ef:focus{border-bottom:1px solid var(--navy);background:rgba(201,168,76,0.08);}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>
<body>
<div id="loginOverlay">
  <div class="login-orb"></div><div class="login-orb2"></div>
  <div class="login-card">
    <div class="login-logo">Araya Finance</div>
    <div class="login-sub">Business Financial Portal</div>
    <div class="login-divider" style="width:40px;height:2px;background:var(--gold);margin:0 auto 36px;"></div>
    <label class="login-label">Password</label>
    <input type="password" class="login-input" id="loginPass" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Access Portal</button>
    <div class="login-error" id="loginErr">Incorrect password. Try again.</div>
    <div class="login-verse">"I can do all things through Christ who strengthens me." — Phil. 4:13</div>
  </div>
</div>
<div class="session-timer" id="sessionTimer"></div>
<div id="appShell">
  <nav class="topnav">
    <div class="topnav-brand" onclick="showView('dashboard')">Araya Finance <span>Portal</span></div>
    <div class="topnav-links">
      <button class="nav-btn" onclick="showView('dashboard')" id="nb-dashboard">Dashboard</button>
      <button class="nav-btn" onclick="showView('invoice')" id="nb-invoice">New Invoice</button>
      <button class="nav-btn" onclick="showView('history')" id="nb-history">History</button>
      <button class="nav-btn" onclick="showView('income')" id="nb-income">Monthly Income</button>
      <button class="nav-btn" onclick="showView('budget')" id="nb-budget">Budget & Debt</button>
      <button class="nav-btn" onclick="showView('spending')" id="nb-spending">Spending</button>
      <button class="nav-btn" onclick="showView('companies')" id="nb-companies">Companies</button>

// ── SUPABASE CLIENT ──────────────────────────────────────
let sb = null;
function initSupabase() {
  if (typeof ARAYA_CONFIG === 'undefined' || ARAYA_CONFIG.SUPABASE_URL.includes('YOUR_PROJECT')) {
    console.warn('Supabase not configured — running in local mode');
    return false;
  }
  sb = supabase.createClient(ARAYA_CONFIG.SUPABASE_URL, ARAYA_CONFIG.SUPABASE_ANON);
  console.log('Supabase connected ✓');
  return true;
}

// ── DB HELPERS ────────────────────────────────────────────
// All functions gracefully fall back to local state if Supabase isn't configured

async function dbLoadAll() {
  if (!sb) return; // use default local state
  try {
    showLoadingBar('Loading your data...');
    const [invRes, coRes, spRes, btRes, beRes, bdRes] = await Promise.all([
      sb.from('invoices').select('*').order('created_at', { ascending: false }),
      sb.from('companies').select('*').order('id'),
      sb.from('spending').select('*').order('created_at', { ascending: false }),
      sb.from('biz_trackers').select('*').order('entity,id'),
      sb.from('budget_expenses').select('*').order('sort_order,id'),
      sb.from('budget_debts').select('*').order('sort_order,id'),
    ]);
    if (invRes.data) {
      state.invoices = invRes.data.filter(i => !i.deleted).map(dbToInv);
      state.deletedInvoices = invRes.data.filter(i => i.deleted).map(dbToInv);
    }
    if (coRes.data) state.companies = coRes.data.map(c => ({id:c.id,name:c.name,type:c.type,address:c.address||'',email:c.email||'',rate:c.rate||33}));
    if (spRes.data) state.spending = spRes.data.map(s => ({id:s.id,month:s.month,date:s.date,desc:s.description,category:s.category,amount:parseFloat(s.amount)||0,imported:s.imported,fromReceipt:s.from_receipt,receiptUrl:s.receipt_url}));
    if (btRes.data) {
      state.bizTrackers = {};
      btRes.data.forEach(r => {
        if (!state.bizTrackers[r.entity]) state.bizTrackers[r.entity] = { months: [] };
        state.bizTrackers[r.entity].months.push({ _id: r.id, month: r.month, amount: parseFloat(r.amount)||0, paid: r.paid });
      });
    }
    if (beRes.data) state.budgetItems.expenses = beRes.data.map(e => ({id:e.id,name:e.name,monthly:parseFloat(e.monthly)||0,category:e.category}));
    if (bdRes.data) state.budgetItems.debts = bdRes.data.map(d => ({id:d.id,name:d.name,balance:parseFloat(d.balance)||0,rate:parseFloat(d.rate)||0,minPayment:parseFloat(d.min_payment)||0}));
    hideLoadingBar();
  } catch(e) { console.error('DB load error:', e); hideLoadingBar(); }
}

function dbToInv(r) {
  return { id:r.id, date:r.date, company:r.company, period:r.period||'', status:r.status, totalHours:r.total_hours, totalDays:r.total_days, rate:parseFloat(r.rate)||33, total:parseFloat(r.total)||0, taxResp:parseFloat(r.tax_resp)||0, netAfterTax:parseFloat(r.net_after_tax)||0, lines:r.lines||[], deletedOn:r.deleted_on };
}

async function dbSaveInvoice(inv) {
  if (!sb) return;
  try {
    await sb.from('invoices').upsert({
      id: inv.id, date: inv.date, company: inv.company, period: inv.period||'',
      status: inv.status, total_hours: inv.totalHours, total_days: inv.totalDays,
      rate: inv.rate, total: inv.total, tax_resp: inv.taxResp, net_after_tax: inv.netAfterTax,
      lines: inv.lines, deleted: false, updated_at: new Date().toISOString()
    });
  } catch(e) { console.error('Save invoice error:', e); }
}

async function dbDeleteInvoice(id, deletedOn) {
  if (!sb) return;
  try {
    await sb.from('invoices').update({ deleted: true, deleted_on: deletedOn, updated_at: new Date().toISOString() }).eq('id', id);
  } catch(e) { console.error('Delete invoice error:', e); }
}

async function dbRestoreInvoice(id) {
  if (!sb) return;
  try {
    await sb.from('invoices').update({ deleted: false, deleted_on: null, updated_at: new Date().toISOString() }).eq('id', id);
  } catch(e) { console.error('Restore invoice error:', e); }
}

async function dbSaveSpending(item) {
  if (!sb) return;
  try {
    await sb.from('spending').upsert({
      id: item.id, month: item.month, date: item.date, description: item.desc,
      category: item.category, amount: item.amount, imported: item.imported||false,
      from_receipt: item.fromReceipt||false, receipt_url: item.receiptUrl||null
    });
  } catch(e) { console.error('Save spending error:', e); }
}

async function dbSaveBizTracker(entity, idx, data) {
  if (!sb) return;
  const existing = state.bizTrackers[entity]?.months[idx];
  try {
    if (existing?._id) {
      await sb.from('biz_trackers').update({ amount: data.amount, paid: data.paid, updated_at: new Date().toISOString() }).eq('id', existing._id);
    } else {
      const res = await sb.from('biz_trackers').insert({ entity, month: data.month, amount: data.amount, paid: data.paid }).select();
      if (res.data?.[0]) state.bizTrackers[entity].months[idx]._id = res.data[0].id;
    }
  } catch(e) { console.error('Save biz tracker error:', e); }
}

async function dbUpdateCompany(co) {
  if (!sb) return;
  try {
    await sb.from('companies').upsert({ id: co.id, name: co.name, type: co.type, address: co.address, email: co.email, rate: co.rate });
  } catch(e) { console.error('Save company error:', e); }
}

async function dbDeleteSpending(id) {
  if (!sb) return;
  try { await sb.from('spending').delete().eq('id', id); }
  catch(e) { console.error('Delete spending error:', e); }
}

// ── RECEIPT UPLOAD TO SUPABASE STORAGE ───────────────────
async function uploadReceiptToStorage(file) {
  if (!sb) return null;
  try {
    const ext = file.name.split('.').pop() || 'jpg';
    const path = `receipts/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const { data, error } = await sb.storage.from(ARAYA_CONFIG.STORAGE_BUCKET).upload(path, file, { upsert: true });
    if (error) { console.error('Storage upload error:', error); return null; }
    const { data: urlData } = sb.storage.from(ARAYA_CONFIG.STORAGE_BUCKET).getPublicUrl(path);
    return urlData.publicUrl;
  } catch(e) { console.error('Upload error:', e); return null; }
}

function showLoadingBar(msg) {
  let bar = document.getElementById('loadingBar');
  if (!bar) {
    bar = document.createElement('div');

    bar.style.cssText = 'position:fixed;top:58px;left:0;right:0;z-index:500;background:var(--navy);color:var(--gold);font-size:11px;padding:8px 20px;letter-spacing:1px;display:flex;align-items:center;gap:10px;';

    document.body.appendChild(bar);
  }

  bar.style.display = 'flex';
}
function hideLoadingBar() {

  }
}
function doLogout(){
  isLoggedIn=false;clearInterval(sessionInterval);

  document.getElementById('sessionTimer').style.display='none';
  document.getElementById('loginPass').value='';
  setTimeout(()=>document.getElementById('loginPass').focus(),400);
}
function startSessionTimer(){
  lastActivity=Date.now();clearInterval(sessionInterval);
  document.getElementById('sessionTimer').style.display='block';
  sessionInterval=setInterval(()=>{
    const left=SESSION_MS-(Date.now()-lastActivity);
    if(left<=0){doLogout();return;}
    const m=Math.floor(left/60000),s=Math.floor((left%60000)/1000);
    document.getElementById('sessionTimer').textContent=`Auto-logout: ${m}:${s.toString().padStart(2,'0')}`;
  },1000);
}
['click','keydown','mousemove','touchstart'].forEach(ev=>document.addEventListener(ev,()=>{if(isLoggedIn)lastActivity=Date.now();},{passive:true}));

function addLR(){const r=document.getElementById('inv-rate')?.value||33;const tr=document.createElement('tr');tr.innerHTML=`<td><input class="date-input" type="text" placeholder="MM/DD/YY" oninput="recalcInv()"/></td><td><input type="number" value="8" oninput="recalcInv()"/></td><td><input type="number" value="${r}" oninput="recalcInv()"/></td><td class="amt-cell">${fmt(r*8)}</td><td><button class="del-row" onclick="delLR(this)">✕</button></td>`;document.getElementById('lineBody').appendChild(tr);recalcInv();}
function delLR(btn){btn.closest('tr').remove();recalcInv();}
function applyRateAll(){const r=parseFloat(document.getElementById('inv-rate')?.value||33);document.querySelectorAll('#lineBody tr').forEach(tr=>{const inp=tr.querySelectorAll('input');if(inp[2])inp[2].value=r;});recalcInv();}
function recalcInv(){
  let sub=0;
  document.querySelectorAll('#lineBody tr').forEach(tr=>{const i=tr.querySelectorAll('input');if(i.length>=3){const h=parseFloat(i[1]?.value)||0,r=parseFloat(i[2]?.value)||0,a=h*r;sub+=a;const ac=tr.querySelector('.amt-cell');if(ac)ac.textContent=fmt(a);}});
  const tr=parseFloat(document.getElementById('inv-tax')?.value||35)/100,tax=sub*tr;
  const g=id=>{const el=document.getElementById(id);return v=>{if(el)el.textContent=v;};};
  g('t-sub')(fmt(sub));g('t-tax')(fmt(tax));g('t-ttax')(fmt(sub+tax));g('t-tot')(fmt(sub));g('t-net')(fmt(sub-tax));
}
function submitInvoice(){

  const ps=document.getElementById('inv-ps')?.value,pe=document.getElementById('inv-pe')?.value;
  const status=document.getElementById('inv-status')?.value||'pending';

  document.querySelectorAll('#lineBody tr').forEach(tr=>{const i=tr.querySelectorAll('input');if(i.length>=3){const dt=i[0]?.value,h=parseFloat(i[1]?.value)||0,r=parseFloat(i[2]?.value)||0;if(dt&&h){lines.push({date:dt,hours:h,rate:r});hrs+=h;sub+=h*r;}}});
  const tx=sub*txR;
  const newInv={id:num,date,company:co?.name||'Unknown',period:ps&&pe?`${ps} – ${pe}`:'',status,totalHours:hrs,totalDays:lines.length,rate:parseFloat(document.getElementById('inv-rate')?.value||33),total:sub,taxResp:tx,netAfterTax:sub-tx,lines}; state.invoices.unshift(newInv); dbSaveInvoice(newInv);
  showToast(`✓ Invoice #${num} saved!`);showView('history');
}

function switchHistTab(tab, el){
  document.querySelectorAll('.btab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('histTab-active').style.display = tab==='active'?'block':'none';
  document.getElementById('histTab-deleted').style.display = tab==='deleted'?'block':'none';
}

function renderHist(){
  const co=document.getElementById('fCo')?.value,st=document.getElementById('fSt')?.value;
  const tb=document.getElementById('histBody');if(!tb)return;
  tb.innerHTML=state.invoices.filter(i=>(!co||i.company===co)&&(!st||i.status===st)).map(inv=>`
  <tr>
    <td><strong style="color:var(--navy)">#${inv.id}</strong></td>
    <td>${inv.date}</td><td>${inv.company}</td><td>${inv.period||'—'}</td>

    <td><span class="status-badge badge-${inv.status}">${inv.status}</span></td>
    <td><div class="action-btns">
      <button class="btn btn-navy btn-sm" onclick="viewInv('${inv.id}')">View</button>
      <button class="btn btn-sm" style="background:#e67e22;color:white" onclick="editInv('${inv.id}')">✏ Edit</button>
      <button class="btn btn-gold btn-sm" onclick="exportInvXLSX('${inv.id}')">Excel</button>
      <button class="btn btn-outline btn-sm" onclick="printInv('${inv.id}')">PDF</button>

function renderDeleted(){
  const tb=document.getElementById('delBody');if(!tb)return;
  const cnt=document.getElementById('delCount');if(cnt)cnt.textContent=state.deletedInvoices.length||'';
  if(!state.deletedInvoices.length){tb.innerHTML=`<tr><td colspan="6" style="padding:28px;text-align:center;color:var(--taupe)">No deleted invoices yet.</td></tr>`;return;}
  tb.innerHTML=state.deletedInvoices.map(inv=>`
  <tr style="opacity:0.75">
    <td><strong style="color:var(--taupe)">#${inv.id}</strong></td>
    <td>${inv.date}</td><td>${inv.company}</td>
    <td>${fmt(inv.total)}</td>
    <td style="font-size:11px;color:var(--taupe)">${inv.deletedOn||'—'}</td>
    <td><div class="action-btns">
      <button class="btn btn-green btn-sm" onclick="restoreInv('${inv.id}')">↩ Restore</button>

function markPaid(id){const inv=state.invoices.find(i=>i.id===id);if(inv){inv.status='paid';dbSaveInvoice(inv);showToast(`Invoice #${id} marked paid ✓`);renderHist();}}

function confirmDeleteInv(id){
  const inv=state.invoices.find(i=>i.id===id);if(!inv)return;
  openModal(`Delete Invoice #${id}?`,`
    <div style="text-align:center;padding:10px 0 24px">
      <div style="font-size:48px;margin-bottom:16px">🗑</div>

      <div style="font-size:14px;color:var(--mid);margin-bottom:6px">Invoice <strong>#${inv.id}</strong> — ${inv.company}</div>
      <div style="font-size:14px;color:var(--mid);margin-bottom:24px">Total: <strong>${fmt(inv.total)}</strong> · Date: ${inv.date}</div>
      <div style="background:var(--champ);padding:12px 16px;font-size:12px;color:var(--taupe);margin-bottom:24px;text-align:left;border-left:3px solid var(--gold)">

      </div>

        <button class="btn btn-outline" onclick="closeModal()" style="min-width:120px">No, Keep It</button>
        <button class="btn btn-red" onclick="deleteInv('${id}');closeModal()" style="min-width:120px">Yes, Delete It</button>
      </div>
    </div>`);
}

function deleteInv(id){
  const idx=state.invoices.findIndex(i=>i.id===id);
  if(idx===-1)return;
  const inv=state.invoices.splice(idx,1)[0];
  inv.deletedOn=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  state.deletedInvoices.unshift(inv);
  dbDeleteInvoice(id, inv.deletedOn);
  showToast(`Invoice #${id} moved to Deleted.`);
  renderHist();renderDeleted();
  // Switch to show deleted tab so they can see it went there
  const delBtn=document.getElementById('htab-deleted');
  if(delBtn) switchHistTab('deleted',delBtn);
}

function restoreInv(id){
  const idx=state.deletedInvoices.findIndex(i=>i.id===id);
  if(idx===-1)return;
  const inv=state.deletedInvoices.splice(idx,1)[0];
  delete inv.deletedOn;
  state.invoices.unshift(inv);
  dbRestoreInvoice(id);
  showToast(`Invoice #${id} restored! ✓`);
  renderHist();renderDeleted();
  const actBtn=document.getElementById('htab-active');
  if(actBtn) switchHistTab('active',actBtn);
}

function permanentDelete(id){
  const inv=state.deletedInvoices.find(i=>i.id===id);if(!inv)return;
  openModal('Permanently Delete?',`
    <div style="text-align:center;padding:10px 0 24px">
      <div style="font-size:48px;margin-bottom:14px">⚠️</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--red);margin-bottom:8px">This cannot be undone.</div>
      <div style="font-size:13px;color:var(--mid);margin-bottom:24px">Invoice <strong>#${inv.id}</strong> will be gone forever.</div>
      <div style="display:flex;gap:12px;justify-content:center">
        <button class="btn btn-outline" onclick="closeModal()" style="min-width:120px">Cancel</button>
        <button class="btn btn-red" onclick="state.deletedInvoices=state.deletedInvoices.filter(i=>i.id!=='${id}');renderDeleted();closeModal();showToast('Permanently deleted.')" style="min-width:140px">Yes, Delete Forever</button>
      </div>
    </div>`);
}

function addEditLR(){
  const tr=document.createElement('tr');
  tr.innerHTML=`<td><input class="date-input" type="text" placeholder="MM/DD/YY" oninput="recalcEditInv()"/></td><td><input type="number" value="8" oninput="recalcEditInv()"/></td><td><input type="number" value="33" oninput="recalcEditInv()"/></td><td class="amt-cell">${fmt(264)}</td><td><button class="del-row" onclick="this.closest('tr').remove();recalcEditInv()">✕</button></td>`;
  document.getElementById('editLineBody')?.appendChild(tr);recalcEditInv();
}

function recalcEditInv(){
  let sub=0;
  document.querySelectorAll('#editLineBody tr').forEach(tr=>{
    const i=tr.querySelectorAll('input');
    if(i.length>=3){const h=parseFloat(i[1]?.value)||0,r=parseFloat(i[2]?.value)||0,a=h*r;sub+=a;const ac=tr.querySelector('.amt-cell');if(ac)ac.textContent=fmt(a);}
  });
  const txR=parseFloat(document.getElementById('ei-tax')?.value||35)/100;
  const tax=sub*txR;
  const g=id=>{const el=document.getElementById(id);return v=>{if(el)el.textContent=v;};};
  g('ei-sub')(fmt(sub));g('ei-tax-amt')(fmt(tax));g('ei-tot')(fmt(sub));g('ei-net')(fmt(sub-tax));
}

function saveEditInv(id){
  const inv=state.invoices.find(i=>i.id===id);if(!inv)return;
  const txR=parseFloat(document.getElementById('ei-tax')?.value||35)/100;
  let lines=[],hrs=0,sub=0;
  document.querySelectorAll('#editLineBody tr').forEach(tr=>{
    const i=tr.querySelectorAll('input');
    if(i.length>=3){const dt=i[0]?.value,h=parseFloat(i[1]?.value)||0,r=parseFloat(i[2]?.value)||0;if(dt&&h){lines.push({date:dt,hours:h,rate:r});hrs+=h;sub+=h*r;}}
  });
  const ps=document.getElementById('ei-ps')?.value,pe=document.getElementById('ei-pe')?.value;
  inv.id=document.getElementById('ei-num')?.value||inv.id;
  inv.date=document.getElementById('ei-date')?.value||inv.date;
  inv.company=document.getElementById('ei-co')?.value||inv.company;
  inv.status=document.getElementById('ei-status')?.value||inv.status;
  inv.period=ps&&pe?`${ps} – ${pe}`:inv.period;
  inv.lines=lines;inv.totalHours=hrs;inv.totalDays=lines.length;
  inv.total=sub;inv.taxResp=sub*txR;inv.netAfterTax=sub-sub*txR;
  dbSaveInvoice(inv); closeModal();showToast(`Invoice #${inv.id} updated!`);renderHist();
}

async function readReceipt(file){
  const proc=document.getElementById('aiProc');
  const pt=document.getElementById('aiProcText');
  if(proc){proc.style.display='flex';pt.textContent=`Reading "${file.name}"...`;}
  const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
  const mon=getSpendMon();
  const today=new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'2-digit'});
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},{type:'text',text:`Read this receipt/screenshot. Return ONLY a JSON object (no markdown, no extra text):
{"amount":0.00,"description":"merchant or what purchased","category":"one of: housing,transport,food,utilities,business,health,personal,entertainment,other","date":"MM/DD/YY or leave blank"}`}]}]})});
    const data=await resp.json();
    const txt=data.content?.[0]?.text||'{}';
    let parsed;try{parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());}catch{parsed={};}
    const receiptUrl = await uploadReceiptToStorage(file);
    const rcptEntry={id:uid(),month:mon,date:parsed.date||today,desc:parsed.description||file.name,category:parsed.category||'other',amount:parseFloat(parsed.amount)||0,fromReceipt:true,receiptUrl};
    state.spending.push(rcptEntry);
    dbSaveSpending(rcptEntry);
    renderSpend();showToast(`✓ ${parsed.description||file.name} — ${fmt(parsed.amount||0)}`);
  }catch(err){
    showToast('Could not auto-read — use Manual Entry!');
    openManual();
  }finally{if(proc)proc.style.display='none';}
}
function exportSpendXLSX(){
  const mon=getSpendMon();
  const items=state.spending.filter(s=>s.month===mon);

  const wb=XLSX.utils.book_new();
  const rows=[['ARAYA CONSULTING LLC — MONTHLY SPENDING'],[`Month: ${mon}`],[],['DATE','DESCRIPTION','CATEGORY','AMOUNT'],...items.map(s=>[s.date,s.desc,s.category,s.amount]),[],['TOTAL','','',tot]];
  const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:14},{wch:32},{wch:16},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws,`Spending ${mon}`);XLSX.writeFile(wb,`Araya_Spending_${mon.replace(' ','_')}.xlsx`);showToast('Spending exported!');
}

function saveCo(){const n=document.getElementById('nc-n')?.value;if(!n){showToast('Enter a name');return;}const newCo={id:Date.now(),name:n,type:document.getElementById('nc-t')?.value,rate:parseFloat(document.getElementById('nc-r')?.value)||33,address:document.getElementById('nc-a')?.value||'',email:document.getElementById('nc-e')?.value||''};state.companies.push(newCo);dbUpdateCompany(newCo);closeModal();showToast(n+' added!');showView('companies');}
function editCo(id){
  const co=state.companies.find(c=>c.id===id);if(!co)return;
  openModal('Edit: '+co.name,`<div class="form-grid"><div class="form-group full"><label class="form-label">Company Name</label><input class="form-input" id="ec-n" value="${co.name}"/></div><div class="form-group"><label class="form-label">Type</label><input class="form-input" id="ec-t" value="${co.type}"/></div><div class="form-group"><label class="form-label">Rate ($/hr)</label><input class="form-input" type="number" id="ec-r" value="${co.rate}"/></div><div class="form-group full"><label class="form-label">Address</label><input class="form-input" id="ec-a" value="${co.address}"/></div><div class="form-group full"><label class="form-label">Email</label><input class="form-input" id="ec-e" value="${co.email}"/></div></div><div style="margin-top:16px;display:flex;justify-content:flex-end;gap:7px"><button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-gold btn-sm" onclick="saveEditCo(${id})">Save</button></div>`);
}
function saveEditCo(id){const co=state.companies.find(c=>c.id===id);if(!co)return;co.name=document.getElementById('ec-n')?.value||co.name;co.type=document.getElementById('ec-t')?.value||co.type;co.rate=parseFloat(document.getElementById('ec-r')?.value)||co.rate;co.address=document.getElementById('ec-a')?.value||co.address;co.email=document.getElementById('ec-e')?.value||co.email;dbUpdateCompany(co);closeModal();showToast('Updated!');showView('companies');}
function newInvFor(id){showView('invoice');setTimeout(()=>{const sel=document.getElementById('inv-company');if(sel){sel.value=id;updateRate();}},100);}

// INIT
initSupabase();
if(sb){dbLoadAll().then(()=>showView('dashboard'));}else{showView('dashboard');}
</script>
</body>
